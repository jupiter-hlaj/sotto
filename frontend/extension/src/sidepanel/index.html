<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sotto</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>

  <!-- ===== LOGIN ===== -->
  <div id="view-login" class="view active">
    <div class="login-container">
      <div class="logo-mark">S</div>
      <h1 class="logo-title">Sotto</h1>
      <p class="logo-tagline">AI Call Intelligence</p>
      <form id="login-form">
        <div class="form-field">
          <label for="email">Email</label>
          <input type="email" id="email" required autocomplete="email" placeholder="you@agency.com">
        </div>
        <div class="form-field">
          <label for="password">Password</label>
          <input type="password" id="password" required autocomplete="current-password">
        </div>
        <div id="new-password-group" class="form-field hidden">
          <label for="new-password">New Password</label>
          <input type="password" id="new-password" autocomplete="new-password" placeholder="Choose a permanent password">
        </div>
        <div id="login-error" class="error-msg"></div>
        <button type="submit" id="login-btn" class="btn-primary">Sign In</button>
      </form>
    </div>
  </div>

  <!-- ===== MAIN (call list) ===== -->
  <div id="view-main" class="view">
    <header class="app-header">
      <h1 class="app-title">Sotto</h1>
      <div class="header-actions">
        <span id="ws-status" class="ws-dot" title="Connecting..."></span>
        <button id="logout-btn" class="btn-ghost">Sign Out</button>
      </div>
    </header>

    <!-- Live call banner -->
    <div id="live-banner" class="live-banner hidden">
      <div class="live-dot"></div>
      <div class="live-text">
        <span id="live-status">Processing call...</span>
      </div>
      <button id="live-view-btn" class="btn-pill">View</button>
    </div>

    <!-- Call list -->
    <div id="call-list" class="call-list"></div>

    <!-- Empty state -->
    <div id="empty-state" class="empty-state hidden">
      <div class="empty-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6A19.79 19.79 0 012.12 4.18 2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.362 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.338 1.85.573 2.81.7A2 2 0 0122 16.92z"/>
        </svg>
      </div>
      <p class="empty-title">No calls yet</p>
      <p class="empty-subtitle">Calls will appear here as they come in</p>
    </div>
  </div>

  <!-- ===== DETAIL ===== -->
  <div id="view-detail" class="view">
    <header class="detail-header">
      <button id="back-btn" class="btn-back">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 12L6 8l4-4"/></svg>
        Calls
      </button>
      <span id="detail-status" class="status-pill"></span>
    </header>

    <div class="detail-content">
      <div class="detail-hero">
        <h2 id="detail-number" class="detail-number">--</h2>
        <div class="detail-meta">
          <span id="detail-direction" class="meta-item">--</span>
          <span class="meta-sep">&middot;</span>
          <span id="detail-duration" class="meta-item">--</span>
          <span class="meta-sep">&middot;</span>
          <span id="detail-date" class="meta-item">--</span>
        </div>
      </div>

      <!-- Summary -->
      <section id="section-summary" class="detail-section hidden">
        <h3 class="section-heading">Summary</h3>
        <p id="detail-summary" class="section-body"></p>
      </section>

      <!-- Action Items -->
      <section id="section-actions" class="detail-section hidden">
        <h3 class="section-heading">Action Items</h3>
        <ul id="detail-actions" class="action-list"></ul>
      </section>

      <!-- Transcript -->
      <section id="section-transcript" class="detail-section">
        <div class="section-header-row">
          <h3 class="section-heading">Transcript</h3>
          <button id="transcript-toggle" class="btn-ghost btn-xs">Collapse</button>
        </div>
        <div id="detail-transcript" class="transcript-container"></div>
      </section>

      <!-- Notes -->
      <section class="detail-section">
        <h3 class="section-heading">Notes</h3>
        <textarea id="detail-notes" class="notes-field" placeholder="Add notes about this call..." rows="3"></textarea>
        <button id="save-notes-btn" class="btn-primary btn-sm">Save Notes</button>
      </section>
    </div>
  </div>

  <script src="../vendor/amazon-cognito-identity.min.js"></script>
  <script src="../shared/auth.js"></script>
  <script src="../shared/api.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>
