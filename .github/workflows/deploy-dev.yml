name: Deploy to Dev

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.DEV_OIDC_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - uses: aws-actions/setup-sam@v2
      - uses: actions/setup-python@v5
        with: { python-version: '3.13' }

      - name: SAM Build
        run: sam build --use-container --template backend/template.yaml

      - name: SAM Deploy (dev)
        run: |
          sam deploy \
            --stack-name sotto-dev \
            --s3-bucket sotto-sam-${{ secrets.AWS_ACCOUNT_ID }}-dev \
            --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM CAPABILITY_AUTO_EXPAND \
            --parameter-overrides \
              Environment=dev \
              LogLevel=DEBUG \
              CognitoAdminEmail=jupiter.hlaj@gmail.com \
              SnsAlertEmail=jupiter.hlaj@gmail.com \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --region ${{ secrets.AWS_REGION }}

      - name: Run smoke tests
        run: |
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name sotto-dev \
            --query "Stacks[0].Outputs[?OutputKey=='SottoHttpApiUrl'].OutputValue" \
            --output text)
          curl -f "$API_URL/health" || exit 1

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-backend
    environment: dev
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.DEV_OIDC_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Build frontend
        run: |
          VITE_API_URL=$(aws cloudformation describe-stacks \
            --stack-name sotto-dev \
            --query "Stacks[0].Outputs[?OutputKey=='SottoHttpApiUrl'].OutputValue" \
            --output text)
          VITE_USER_POOL_CLIENT_ID=$(aws cloudformation describe-stacks \
            --stack-name sotto-dev \
            --query "Stacks[0].Outputs[?OutputKey=='UserPoolClientId'].OutputValue" \
            --output text)
          cd frontend/admin-portal && npm ci && \
            VITE_API_URL=$VITE_API_URL \
            VITE_USER_POOL_CLIENT_ID=$VITE_USER_POOL_CLIENT_ID \
            VITE_AWS_REGION=${{ secrets.AWS_REGION }} \
            npm run build
      - name: Sync to S3
        run: |
          BUCKET=sotto-portal-${{ secrets.AWS_ACCOUNT_ID }}-dev
          aws s3 sync frontend/admin-portal/dist/ s3://$BUCKET --delete
          CF_ID=$(aws cloudformation describe-stacks \
            --stack-name sotto-dev \
            --query "Stacks[0].Outputs[?OutputKey=='PortalDistributionId'].OutputValue" \
            --output text)
          aws cloudfront create-invalidation --distribution-id $CF_ID --paths "/*"
